<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event</title>
</head>
<body>
    <button onclick="alert('Testing')">Click me!</button>
    <input type="text" onchange="alert('Data dimasukan')">
    <input type="text" oninput="alert('Data dimasukan')">

    <input type="checkbox" onchange="alert('Clicked!')">

    <select onchange="pilihKota(this)" id="selectKota">
        <option value="Bekasi">Bekasi</option>
        <option value="Jakarta">Jakarta</option>
        <option value="Tangerang">Tangerang</option>
        <option value="Bogor">Bogor</option>
    </select>

    <script>
        function pilihKota(element) {
           const kota = element.value
           console.log(`Kota ${kota} telah dipilih!`);
        }

        const selectKota = document.getElementById(`selectKota`)
        selectKota.addEventListener(`change`, function () {
            const kota = selectKota.value

            console.log(`Kota ${kota} telah dipilih!`);
            
        })
    </script>

</body>
</html>
